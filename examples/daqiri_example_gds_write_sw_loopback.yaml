%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: "sw"

    memory_regions:
    - name: "Data_TX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 8192
      buf_size: 316
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 8192
      buf_size: 316

    interfaces:
    - name: "loopback_ports"
      address: "loopback"
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 16
          cpu_core: 11
          timeout_us: 1000
          memory_regions:
            - "Data_TX_GPU"
          offloads:
            - "tx_eth_src"
      rx:
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          timeout_us: 1000
          batch_size: 16
          memory_regions:
            - "Data_RX_GPU"

bench_rx:
  interface_name: "loopback_ports"
  cpu_core: 9

bench_tx:
  interface_name: "loopback_ports"
  cpu_core: 11
  batch_size: 16
  payload_size: 256
  header_size: 60
  eth_src_addr: 02:00:00:00:00:01
  eth_dst_addr: 02:00:00:00:00:02
  ip_src_addr: 10.0.0.1
  ip_dst_addr: 10.0.0.2
  udp_src_port: 4096
  udp_dst_port: 4096
