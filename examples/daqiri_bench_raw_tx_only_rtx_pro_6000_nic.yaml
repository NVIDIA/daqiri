# RTX PRO 6000 -- DPDK GPUDirect TX-only sender for ibverbs RX pairing.
# Binds a single TX port; the RX port stays kernel-bound for ibverbs MPRQ.
#
%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_TX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 51200
      buf_size: 8064

    interfaces:
    - name: "tx_port"
      address: 0000:61:00.0
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 10240
          cpu_core: 11
          memory_regions:
            - "Data_TX_GPU"
          offloads:
            - "tx_eth_src"

bench_tx:
  interface_name: "tx_port"
  cpu_core: 10
  batch_size: 10240
  payload_size: 8000
  header_size: 64
  eth_dst_addr: <00:00:00:00:00:00>
  ip_src_addr: 1.2.3.4
  ip_dst_addr: 5.6.7.8
  udp_src_port: 4096
  udp_dst_port: 4096
