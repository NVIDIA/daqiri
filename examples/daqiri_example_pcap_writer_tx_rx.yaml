%YAML 1.2
---
# Replace angle-bracket placeholders with your NIC PCIe addresses and MACs.
# The bench_tx block is only for demonstration traffic; remove it or omit --tx
# when using this example as an RX-only tcpdump-like capture utility.
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_TX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 16384
      buf_size: 2048
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 16384
      buf_size: 2048

    interfaces:
    - name: "tx_port"
      address: <TX_PCIe_ADDR>
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 1024
          cpu_core: <CPU_CORE>
          memory_regions:
            - "Data_TX_GPU"
          offloads:
            - "tx_eth_src"
    - name: "rx_port"
      address: <RX_PCIe_ADDR>
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: <CPU_CORE>
          timeout_us: 1000
          batch_size: 1024
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096

bench_rx:
  interface_name: "rx_port"

bench_tx:
  interface_name: "tx_port"
  batch_size: 1024
  payload_size: 256
  header_size: 42
  eth_src_addr: <TX_PORT_MAC>
  eth_dst_addr: <RX_PORT_MAC>
  ip_src_addr: "10.10.0.1"
  ip_dst_addr: "10.10.0.2"
  udp_src_port: 4096
  udp_dst_port: 4096
