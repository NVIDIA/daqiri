%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_TX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 16384
      buf_size: 2048
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 16384
      buf_size: 2048
    - name: "Reorder_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 128
      # Worst-case validated size uses the source MR slot: (2048 - 64) int4 bytes -> fp32
      # for 256 packets per seq_batch_number batch: 1,984 * 2 * 4 * 256 = 4,063,232 bytes.
      buf_size: 4063232

    interfaces:
    - name: "tx_port"
      address: <0000:00:00.0>
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 256
          cpu_core: 11
          memory_regions:
            - "Data_TX_GPU"
          offloads:
            - "tx_eth_src"
    - name: "rx_port"
      address: <0000:00:00.1>
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          batch_size: 256
          timeout_us: 20000
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "flow_0"
          id: 201
          action:
            type: queue
            id: 0
          match:
            udp_src: 5000
            udp_dst: 5000
        reorder_configs:
        - name: "rx_reorder_quantize_seq_batch"
          reorder_type: "gpu"
          memory_region: "Reorder_RX_GPU"
          payload_byte_offset: 64
          flow_ids:
            - 201
          data_types:
            input_type: "int4"
            output_type: "fp32"
            endianness: "host"
          method:
            seq_batch_number:
              sequence_number:
                bit_offset: 128
                bit_width: 10
              batch_number:
                bit_offset: 144
                bit_width: 2

bench_rx:
  interface_name: "rx_port"
  cpu_core: 8
  gpu_direct: true
  split_boundary: false
  batch_size: 256
  max_packet_size: 2048
  header_size: 64

bench_tx:
  interface_name: "tx_port"
  cpu_core: 10
  gpu_direct: true
  split_boundary: false
  batch_size: 256
  payload_size: 256
  header_size: 64
  eth_dst_addr: <00:00:00:00:00:00>
  ip_src_addr: <1.2.3.4>
  ip_dst_addr: <5.6.7.8>
  udp_src_port: 5000
  udp_dst_port: 5000

bench_reorder_quantize:
  input_type: "int4"
  output_type: "fp32"
  endianness: "host"
  verify_batches: 3
  verify_chunks: 6
  chunk_elements: 16
