# DGX Spark (GB10) TCP socket bench -- client-only config for the netns wire loopback.
# Pair with daqiri_bench_socket_tcp_tx_rx_netns_server.yaml (run in parallel, each in
# its own network namespace via setup_spark_wire_loopback_netns.sh).
#
# Run inside dq_wire_client namespace:
#   ip netns exec dq_wire_client daqiri_bench_socket <this_file> --seconds N --mode client
#
# Derived from examples/daqiri_bench_socket_tcp_tx_rx.yaml per
# docs/benchmarks/socket_benchmarking.md. See the server file's header for the
# documented deviations from the tutorial template.
#
%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "socket"
    protocol: "tcp"
    master_core: 8
    debug: false
    log_level: "info"

    memory_regions:
    - name: "DATA_SOCKET_CLIENT"
      kind: "host"
      affinity: 0
      num_bufs: 64
      buf_size: 1048576

    interfaces:
    - name: tcp_client
      address: 10.250.0.1
      socket_config:
        mode: client
        local_ip: 10.250.0.1
        local_port: 6002
        remote_ip: 10.250.0.2
        remote_port: 6001
        max_payload_size: 1048576
      tx:
        queues:
        - name: "Client_TX_Queue"
          id: 0
          cpu_core: 16
          batch_size: 1
          memory_regions:
            - "DATA_SOCKET_CLIENT"
      rx:
        queues:
        - name: "Client_RX_Queue"
          id: 0
          cpu_core: 16
          batch_size: 1
          memory_regions:
            - "DATA_SOCKET_CLIENT"

socket_bench_client:
  server: false
  send: true
  receive: false
  iterations: 1000000000
  message_size: 1024
  server_address: 10.250.0.2
  client_address: 10.250.0.1
  server_port: 6001
