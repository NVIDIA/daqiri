# DGX Spark (GB10) ready-to-run config for daqiri_bench_rdma.
# Templated version (different IPs, different cores) is in
# daqiri_bench_rdma_tx_rx.yaml.
#
# Spark substitutions:
#   - IPs: 1.1.1.1 (client/TX) and 2.2.2.2 (server/RX), matching the
#     daqiri-tx / daqiri-rx nmcli profiles documented in the system
#     configuration tutorial DGX Spark tab.
#   - cpu_core values for DAQIRI queue threads and benchmark app role threads
#     are pulled from the isolated big-cluster X925 cores 16-19 (see grub
#     drop-in /etc/default/grub.d/daqiri-tuning.cfg).
#   - master_core: 8 (non-isolated big core).
#   - kind: host_pinned (already correct upstream and required on GB10
#     where peermem is N/A and DMA-BUF is unreachable).
#
%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "socket"
    master_core: 8
    debug: false
    log_level: "info"

    memory_regions:
    - name: "DATA_RX_GPU_SERVER"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 20
      buf_size: 9000000
    - name: "DATA_TX_GPU_SERVER"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 20
      buf_size: 9000000
    - name: "DATA_TX_GPU_CLIENT"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 20
      buf_size: 90000000
    - name: "DATA_RX_GPU_CLIENT"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 20
      buf_size: 90000000

    interfaces:
    - name: my_client
      address: 1.1.1.1
      socket_config:
        mode: client
        local_addr: "roce://1.1.1.1"
      roce_config:
        transport_mode: RC
      tx:
        queues:
        - name: "Client_TX_Queue"
          id: 0
          batch_size: 1
          cpu_core: 17
      rx:
        queues:
        - name: "Client_RX_Queue"
          id: 0
          cpu_core: 18
          batch_size: 1
    - name: my_server
      address: 2.2.2.2
      socket_config:
        mode: server
        local_addr: "roce://2.2.2.2:4096"
      roce_config:
        transport_mode: RC
      rx:
        queues:
        - name: "Server_RX_Queue"
          id: 0
          cpu_core: 19
          batch_size: 1
      tx:
        queues:
        - name: "Server_TX_Queue"
          id: 0
          cpu_core: 16
          batch_size: 1

rdma_bench_server:
  server_address: 2.2.2.2
  server_port: 4096
  message_size: 8000000
  send: true
  receive: true
  cpu_core: 19
  server: true

rdma_bench_client:
  message_size: 8000000
  client_address: 1.1.1.1
  server_address: 2.2.2.2
  server_port: 4096
  receive: true
  send: true
  cpu_core: 17
  server: false
