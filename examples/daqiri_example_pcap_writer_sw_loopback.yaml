%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: "sw"

    memory_regions:
    - name: "Data_TX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 8192
      buf_size: 2048
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 8192
      buf_size: 2048

    interfaces:
    - name: "loopback_ports"
      address: "loopback"
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 1024
          cpu_core: 11
          timeout_us: 1000
          memory_regions:
            - "Data_TX_GPU"
          offloads:
            - "tx_eth_src"
      rx:
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          timeout_us: 1000
          batch_size: 1024
          memory_regions:
            - "Data_RX_GPU"

bench_rx:
  interface_name: "loopback_ports"

bench_tx:
  interface_name: "loopback_ports"
  batch_size: 1024
  payload_size: 256
  header_size: 42
  eth_src_addr: "02:00:00:00:00:01"
  eth_dst_addr: "02:00:00:00:00:02"
  ip_src_addr: "10.10.0.1"
  ip_dst_addr: "10.10.0.2"
  udp_src_port: 4096
  udp_dst_port: 4096
