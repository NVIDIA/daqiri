%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_TX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 51200
      buf_size: 8064
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 51200
      buf_size: 8064

    interfaces:
    - name: "tx_port"
      address: <0000:00:00.0>
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 10240
          cpu_core: 11
          memory_regions:
            - "Data_TX_GPU"
          offloads:
            - "tx_eth_src"
        flows:
        - name: "vxlan_encap"
          id: 100
          actions:
          - type: tunnel_encap
            tunnel:
              type: vxlan
              outer_eth_src: <00:00:00:00:00:00>
              outer_eth_dst: <00:00:00:00:00:00>
              outer_ipv4_src: <192.0.2.1>
              outer_ipv4_dst: <192.0.2.2>
              outer_udp_src: 49152
              outer_udp_dst: 4789
              vni: 100
          match:
            udp_src: 4096
            udp_dst: 4096
    - name: "rx_port"
      address: <0000:00:00.0>
      rx:
        flow_isolation: true
        queues:
        - name: "rq_q_0"
          id: 0
          cpu_core: 9
          batch_size: 10240
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "vxlan_decap"
          id: 100
          actions:
          - type: tunnel_decap
            tunnel:
              type: vxlan
              outer_eth_src: <00:00:00:00:00:00>
              outer_eth_dst: <00:00:00:00:00:00>
              outer_ipv4_src: <192.0.2.1>
              outer_ipv4_dst: <192.0.2.2>
              outer_udp_src: 49152
              outer_udp_dst: 4789
              vni: 100
          - type: queue
            id: 0

bench_rx:
- interface_name: "rx_port"
  cpu_core: 8

bench_tx:
- interface_name: "tx_port"
  cpu_core: 10
  batch_size: 10240
  payload_size: 8000
  header_size: 64
  eth_dst_addr: <00:00:00:00:00:00>
  ip_src_addr: <1.2.3.4>
  ip_dst_addr: <5.6.7.8>
  udp_src_port: 4096
  udp_dst_port: 4096
