%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_RX_GPU1"
      kind: "device"
      affinity: 0
      num_bufs: 51200
      buf_size: 1064
    - name: "Data_RX_GPU2"
      kind: "device"
      affinity: 0
      num_bufs: 51200
      buf_size: 1064

    interfaces:
    - name: "rx_port"
      address: <0000:00:00.0>
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          batch_size: 10240
          memory_regions:
            - "Data_RX_GPU1"
        - name: "rx_q_1"
          id: 1
          cpu_core: 9
          batch_size: 10240
          memory_regions:
            - "Data_RX_GPU2"
        flows:
        - name: "flow_4096"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096
        - name: "flow_4095"
          id: 1
          action:
            type: queue
            id: 1
          match:
            udp_src: 4095
            udp_dst: 4095

bench_rx:
  interface_name: "rx_port"
