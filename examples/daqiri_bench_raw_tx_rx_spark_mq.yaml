# Multi-queue core-scaling base -- the (TX=2, RX=2) superset. PLATFORM TEMPLATE:
# the @TOKEN@ fields (kind, cores, PCI, num_bufs) are filled by run_spark_mq_bench.sh
# from examples/bench_platform_<P>.env (BENCH_PLATFORM=spark|igx). The detailed
# core-cluster notes below describe the SPARK profile; IGX uses isolcpus 9-11 with
# kind: device (discrete GPU GPUDirect). See "Platform profiles" in AGENTS.md.
#
# This is the single checked-in config for the multi-queue scaling sweep. The
# matrix cells (TX,RX) = (1,1),(1,2),(2,1),(2,2) are derived from this file at
# sweep time by scripts/gen_spark_mq_config.py (invoked by run_spark_mq_bench.sh),
# which prunes queues/flows/memory-regions/bench entries down to each cell. To
# run a single cell by hand, e.g. (1,2):
#   scripts/gen_spark_mq_config.py examples/daqiri_bench_raw_tx_rx_spark_mq.yaml \
#       --tx 1 --rx 2 --payload 8000 --eth-dst <rx_port MAC> > cell.yaml
#   daqiri_bench_raw_gpudirect cell.yaml --seconds 30
# As shown below (no pruning) it is the balanced (2,2) cell.
#
# Shared Spark substitutions (same as daqiri_bench_raw_tx_rx_spark.yaml):
#   - over-the-wire loopback: tx_port 0000:01:00.0 (p0) -> rx_port 0002:01:00.1
#     (p1) are different physical ports cross-cabled by the chassis QSFP loop, so
#     traffic crosses the cable. See the "Port topology" section of the "DGX
#     Spark" tab in docs/tutorials/system_configuration.md.
#   - kind: host_pinned (GB10 unified memory; nvidia_peermem does not load).
#   - Each queue's poller and worker run on SEPARATE isolated X925 cores, kept in
#     the same hardware cluster where possible so the poller->worker ring handoff
#     stays in-cluster (a cross-cluster handoff roughly halves the small-payload
#     op-rate). The two performance clusters are cpu 15-19 and cpu 5-9.
#     NOTE: queue POLLERS are DPDK EAL lcores and must avoid any core the CUDA
#     runtime pins helper threads to -- CUDA lands on the low cores of the 5-9
#     cluster (seen on 5 and 6, unpredictably) and an EAL lcore on a CUDA-occupied
#     core never launches, hanging the bench. So pollers use only 15-19 + core 9
#     (never 5/6/8). Bench WORKERS are plain pinned pthreads and coexist with CUDA
#     fine, so they may use 5/6.
#       TX q0: poller 16 / worker 15   (cluster 15-19, local)
#       RX q0: poller 18 / worker 17   (cluster 15-19, local)  -- 1t1r lives here,
#                                       matching the single-queue config
#       RX q1: poller 9  / worker 7    (cluster 5-9, local; RX kept local)
#       TX q1: poller 19 / worker 6    (poller in 15-19, worker in 5-9: this one
#                                       handoff crosses clusters, but TX is not
#                                       the small-payload bottleneck so it is ok)
#     This needs the EXPANDED isolcpus=5-9,15-19 (all 10 big cores).
#   - master_core 8 (big core).
#   - native shape: 8 KB payload (payload_size 8000 + header_size 64).
#   - eth_dst_addr: your rx_port's (p1) own MAC; fill per-system, e.g.
#       cat /sys/class/net/enP2p1s0f1np1/address
#
# Cell (2,2): two TX queues (pollers 16,19) feed two RX queues (pollers 18,9), one
# flow per pair -- tx_q_0 on (4096,4096) -> rx_q_0 and tx_q_1 on (4097,4097) ->
# rx_q_1. Fully balanced; the top of the scaling matrix and should beat (1,1)
# when a single core is the bottleneck.
%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: @CORE_MASTER@
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    # IGX discrete RTX 6000 Ada -> real GPUDirect: kind device for both TX and RX
    # (NIC DMAs straight to VRAM). VRAM is 49 GB, so large pools are fine; RX gets
    # the deep pool the ANO gpu-only config uses to sustain line rate drop-free.
    - name: "Data_TX_GPU_0"
      kind: "@MEM_KIND@"
      affinity: 0
      num_bufs: @NUM_BUFS_TX@
      buf_size: 8064
    - name: "Data_TX_GPU_1"
      kind: "@MEM_KIND@"
      affinity: 0
      num_bufs: @NUM_BUFS_TX@
      buf_size: 8064
    - name: "Data_RX_GPU_0"
      kind: "@MEM_KIND@"
      affinity: 0
      num_bufs: @NUM_BUFS_RX@
      buf_size: 8064
    - name: "Data_RX_GPU_1"
      kind: "@MEM_KIND@"
      affinity: 0
      num_bufs: @NUM_BUFS_RX@
      buf_size: 8064

    interfaces:
    - name: "tx_port"
      address: "@DPDK_TX_PCI@"   # quoted: PyYAML (gen_spark_mq_config.py) else reads the BDF as base-60
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 10240
          cpu_core: @CORE_MQ_TXQ0@
          memory_regions:
            - "Data_TX_GPU_0"
          offloads:
            - "tx_eth_src"
        - name: "tx_q_1"
          id: 1
          batch_size: 10240
          cpu_core: @CORE_MQ_TXQ1@
          memory_regions:
            - "Data_TX_GPU_1"
          offloads:
            - "tx_eth_src"
    - name: "rx_port"
      address: "@DPDK_RX_PCI@"   # quoted: PyYAML (gen_spark_mq_config.py) else reads the BDF as base-60
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: @CORE_MQ_RXQ0@
          batch_size: 10240
          memory_regions:
            - "Data_RX_GPU_0"
        - name: "rx_q_1"
          id: 1
          cpu_core: @CORE_MQ_RXQ1@
          batch_size: 10240
          memory_regions:
            - "Data_RX_GPU_1"
        flows:
        - name: "flow_0"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096
        - name: "flow_1"
          id: 1
          action:
            type: queue
            id: 1
          match:
            udp_src: 4097
            udp_dst: 4097

bench_rx:
- interface_name: "rx_port"
  queue_id: 0
  cpu_core: @CORE_MQ_RXW0@         # RX q0 worker
- interface_name: "rx_port"
  queue_id: 1
  cpu_core: @CORE_MQ_RXW1@         # RX q1 worker

bench_tx:
- interface_name: "tx_port"
  queue_id: 0
  cpu_core: @CORE_MQ_TXW0@         # TX q0 worker
  batch_size: 10240
  payload_size: 8000
  header_size: 64
  eth_dst_addr: <00:00:00:00:00:00>
  ip_src_addr: 1.1.1.1
  ip_dst_addr: 2.2.2.2
  udp_src_port: 4096
  udp_dst_port: 4096
- interface_name: "tx_port"
  queue_id: 1
  cpu_core: @CORE_MQ_TXW1@         # TX q1 worker
  batch_size: 10240
  payload_size: 8000
  header_size: 64
  eth_dst_addr: <00:00:00:00:00:00>
  ip_src_addr: 1.1.1.1
  ip_dst_addr: 2.2.2.2
  udp_src_port: 4097
  udp_dst_port: 4097
