# DGX Spark (GB10) RDMA bench — client-only config for the netns wire loopback.
# Pair with daqiri_bench_rdma_tx_rx_spark_netns_server.yaml (run in parallel,
# each in its own network namespace via setup_spark_wire_loopback_netns.sh).
#
# Run inside dq_wire_client namespace:
#   ip netns exec dq_wire_client daqiri_bench_rdma <this_file> --seconds N --mode client
#
# IPs / RDMA devices match setup_spark_wire_loopback_netns.sh defaults:
#   CLIENT_IP=10.250.0.1  CLIENT_NS=dq_wire_client  CLIENT_RDMA=rocep1s0f0
#
# cpu_core values use the isolated X925 big-cluster cores 16-19 (isolcpus).
#
%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "socket"
    protocol: "roce"
    master_core: 8
    debug: false
    log_level: "info"

    # num_bufs must be >= the flow-control window (tx_depth for TX, rx_depth for
    # RX) below, or is_tx_burst_available() caps the effective window at num_bufs
    # and throttles small-message op-rate. buf_size is 10 MB: comfortably above the
    # 8 MB largest sweep message and symmetric with the server, while bounding
    # pinned memory (128 * 10 MB * 2 MRs ~= 2.5 GB/process) instead of the ~23 GB a
    # 90 MB buffer would need at this depth.
    # run_spark_bench.sh's rdma sweep rewrites num_bufs/buf_size/{rx,tx}_depth per
    # message size (deep window at small sizes, memory-capped at large ones).
    memory_regions:
    - name: "DATA_TX_GPU_CLIENT"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 128
      buf_size: 10000000
    - name: "DATA_RX_GPU_CLIENT"
      kind: "host_pinned"
      affinity: 0
      num_bufs: 128
      buf_size: 10000000

    interfaces:
    - name: my_client
      address: 10.250.0.1
      socket_config:
        mode: client
        remote_ip: 10.250.0.2
        remote_port: 4096
      roce_config:
        transport_mode: RC
      tx:
        queues:
        - name: "Client_TX_Queue"
          id: 0
          cpu_core: 17
          batch_size: 1
      rx:
        queues:
        - name: "Client_RX_Queue"
          id: 0
          cpu_core: 18
          batch_size: 1

rdma_bench_client:
  message_size: 8000000
  # Flow-control windows (PR #144). Pre-post rx_depth receives before sending and
  # bound the transmit side by tx_depth so small-message SENDs don't outrun the
  # peer's posted receives and trigger RNR NACKs. Keep <= the MR num_bufs above.
  rx_depth: 128
  tx_depth: 128
  client_address: 10.250.0.1
  server_address: 10.250.0.2
  server_port: 4096
  receive: true
  send: true
  server: false
