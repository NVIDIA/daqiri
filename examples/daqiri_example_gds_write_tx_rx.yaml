%YAML 1.2
---
daqiri:
  cfg:
    version: 1
    stream_type: "raw"
    master_core: 3
    debug: false
    log_level: "info"
    loopback: ""

    memory_regions:
    - name: "Data_TX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 8192
      buf_size: 316
    - name: "Data_RX_GPU"
      kind: "device"
      affinity: 0
      num_bufs: 8192
      buf_size: 316

    interfaces:
    - name: "tx_port"
      address: <TX_PCIE_ADDR>
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          batch_size: 16
          cpu_core: 11
          timeout_us: 1000
          memory_regions:
            - "Data_TX_GPU"
          offloads:
            - "tx_eth_src"
    - name: "rx_port"
      address: <RX_PCIE_ADDR>
      rx:
        flow_isolation: true
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 9
          timeout_us: 1000
          batch_size: 16
          memory_regions:
            - "Data_RX_GPU"
        flows:
        - name: "gds_write_udp"
          id: 0
          action:
            type: queue
            id: 0
          match:
            udp_src: 4096
            udp_dst: 4096

bench_rx:
  interface_name: "rx_port"

bench_tx:
  interface_name: "tx_port"
  batch_size: 16
  payload_size: 256
  header_size: 60
  eth_src_addr: <TX_PORT_MAC>
  eth_dst_addr: <RX_PORT_MAC>
  ip_src_addr: <10.0.0.1>
  ip_dst_addr: <10.0.0.2>
  udp_src_port: 4096
  udp_dst_port: 4096
