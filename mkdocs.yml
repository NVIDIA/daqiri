site_name: DAQIRI Documentation
site_url: https://nvidia.github.io/daqiri/
repo_url: https://github.com/nvidia/daqiri
repo_name: nvidia/daqiri

theme:
  name: material
  logo: images/logo.svg
  favicon: images/logo.png
  palette:
    - scheme: slate
      primary: black
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/platform-tab-toc.js
  - javascripts/tab-dropdowns.js

site_dir: site

# The detailed per-platform performance report is kept in the repo for our own
# reference while the full test matrix is completed, but is NOT published — only the
# pared-down benchmarks/performance-*.md pages go on the site. exclude_docs drops it
# from the build entirely (so `mkdocs build --strict` does not flag it either).
exclude_docs: |
  /performance-dgx-spark.md

nav:
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Benchmarking:
    - Overview: benchmarks/benchmarks.md
    - Socket and RDMA Benchmarking: benchmarks/socket_benchmarking.md
    - Raw Ethernet Benchmarking: benchmarks/raw_benchmarking.md
    - "Performance: DGX Spark": benchmarks/performance-dgx-spark.md
  - API Reference:
    - API Guide: api-reference/index.md
    - Configuration YAML Reference: api-reference/configuration.md
    - C++ API Usage: api-reference/cpp.md
    - Python API Usage: api-reference/python.md
  - Tutorials:
    - System Configuration: tutorials/system_configuration.md
    - Bare-Metal CMake Build: tutorials/bare-metal-cmake-build.md
    - Configuration YAML Walkthrough: tutorials/configuration-walkthrough.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

docs_dir: docs

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

plugins:
  - search
