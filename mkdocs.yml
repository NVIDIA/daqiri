site_name: DAQIRI Documentation
site_url: https://nvidia.github.io/daqiri/
repo_url: https://github.com/nvidia/daqiri
repo_name: nvidia/daqiri

theme:
  name: material
  palette:
    primary: green
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

site_dir: site

nav:
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - API Reference: api-guide.md
  - Tutorials:
    - Overview: tutorials/index.md
    - System Configuration: tutorials/system_config/README.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

docs_dir: docs

plugins:
  - search
