<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" fill="none">
  <defs>
    <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b8e8f0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7bcfdf" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a8faa"/>
      <stop offset="100%" stop-color="#1f6a82"/>
    </linearGradient>
    <linearGradient id="serverFaceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2a7a95"/>
      <stop offset="100%" stop-color="#1a5f78"/>
    </linearGradient>
    <linearGradient id="limeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c8e840"/>
      <stop offset="100%" stop-color="#76b900"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <clipPath id="bowlClip">
      <polygon points="60,22 130,22 100,95 90,95"/>
    </clipPath>
  </defs>

  <!-- ── GLASS ─────────────────────────────────── -->

  <!-- Liquid fill inside bowl -->
  <polygon points="65,28 125,28 100,90 90,90" fill="url(#liquidGrad)"/>

  <!-- Tiny wave on liquid surface -->
  <path d="M 68 36 Q 80 32 95 36 Q 110 40 122 36" stroke="#a0dce8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Bowl outline (inverted triangle) -->
  <polygon points="60,22 130,22 95,96" stroke="white" stroke-width="2" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Shine highlight on left face of bowl -->
  <polygon points="62,26 78,26 68,70" fill="url(#glassGrad)" opacity="0.4"/>

  <!-- Stem -->
  <line x1="95" y1="96" x2="95" y2="145" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- Base -->
  <ellipse cx="95" cy="148" rx="28" ry="6" stroke="white" stroke-width="2" fill="none" opacity="0.85"/>

  <!-- ── LIME SLICE ───────────────────────────── -->
  <!-- Lime sits on rim at top-right of glass -->
  <g transform="translate(117, 16) rotate(15)">
    <!-- Outer peel -->
    <circle cx="0" cy="0" r="16" fill="url(#limeGrad)" opacity="0.95"/>
    <!-- Peel ring -->
    <circle cx="0" cy="0" r="13" fill="#a8d800" opacity="0.6"/>
    <!-- Flesh segments -->
    <circle cx="0" cy="0" r="11" fill="#c8e840" opacity="0.5"/>
    <line x1="0" y1="-11" x2="0"  y2="11"  stroke="#76b900" stroke-width="1" opacity="0.6"/>
    <line x1="-11" y1="0" x2="11" y2="0"   stroke="#76b900" stroke-width="1" opacity="0.6"/>
    <line x1="-8" y1="-8" x2="8"  y2="8"   stroke="#76b900" stroke-width="0.8" opacity="0.4"/>
    <line x1="8" y1="-8"  x2="-8" y2="8"   stroke="#76b900" stroke-width="0.8" opacity="0.4"/>
    <!-- Centre pip -->
    <circle cx="0" cy="0" r="2.5" fill="#76b900" opacity="0.7"/>
  </g>

  <!-- ── CABLE ───────────────────────────────── -->
  <!-- Connector plug at glass end — close to bowl right edge -->
  <rect x="100" y="88" width="10" height="6" rx="1.5" fill="#555" stroke="#888" stroke-width="0.8"/>
  <!-- Cable path: extends from glass to server -->
  <path d="M 110 91 C 138 91, 152 110, 168 110" stroke="#76b900" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Second thinner cable -->
  <path d="M 110 93 C 136 93, 150 115, 168 115" stroke="#76b900" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <!-- Connector plug at server end -->
  <rect x="166" y="107" width="10" height="6" rx="1.5" fill="#555" stroke="#888" stroke-width="0.8"/>

  <!-- ── SERVER STACK ────────────────────────── -->
  <!-- Server body shadow/depth -->
  <rect x="180" y="60" width="80" height="115" rx="5" fill="#0f4a5e" opacity="0.5"/>

  <!-- Main server face -->
  <rect x="176" y="56" width="80" height="115" rx="5" fill="url(#serverGrad)"/>

  <!-- Server top face (3D look) -->
  <path d="M 176 56 L 184 48 L 264 48 L 256 56 Z" fill="#4aa8c5" opacity="0.8"/>
  <!-- Server right face (3D look) -->
  <path d="M 256 56 L 264 48 L 264 163 L 256 171 Z" fill="#1a5a72" opacity="0.9"/>

  <!-- ── RACK UNITS (4 units) ─────────────────── -->
  <!-- Unit 1 -->
  <rect x="182" y="62"  width="68" height="22" rx="2" fill="#1f6a82"/>
  <rect x="186" y="66"  width="40" height="6"  rx="1" fill="#155568" opacity="0.8"/>
  <rect x="186" y="74"  width="30" height="3"  rx="1" fill="#155568" opacity="0.5"/>
  <circle cx="234" cy="70" r="2.5" fill="#76b900" opacity="0.9"/>
  <circle cx="241" cy="70" r="2.5" fill="#76b900" opacity="0.5"/>
  <circle cx="245" cy="74" r="1.5" fill="#ff6b35" opacity="0.7"/>

  <!-- Unit 2 -->
  <rect x="182" y="86"  width="68" height="22" rx="2" fill="#1a5f78"/>
  <rect x="186" y="90"  width="35" height="6"  rx="1" fill="#124f65" opacity="0.8"/>
  <rect x="186" y="98"  width="25" height="3"  rx="1" fill="#124f65" opacity="0.5"/>
  <circle cx="234" cy="94" r="2.5" fill="#76b900" opacity="0.9"/>
  <circle cx="241" cy="94" r="2.5" fill="#76b900" opacity="0.3"/>
  <circle cx="245" cy="98" r="1.5" fill="#76b900" opacity="0.8"/>

  <!-- Unit 3 -->
  <rect x="182" y="110" width="68" height="22" rx="2" fill="#1f6a82"/>
  <rect x="186" y="114" width="45" height="6"  rx="1" fill="#155568" opacity="0.8"/>
  <rect x="186" y="122" width="20" height="3"  rx="1" fill="#155568" opacity="0.5"/>
  <circle cx="234" cy="118" r="2.5" fill="#76b900" opacity="0.9"/>
  <circle cx="241" cy="118" r="2.5" fill="#a0d000" opacity="0.7"/>
  <circle cx="245" cy="122" r="1.5" fill="#ff6b35" opacity="0.5"/>

  <!-- Unit 4 (bottom, slightly different — ports visible) -->
  <rect x="182" y="134" width="68" height="32" rx="2" fill="#1a5f78"/>
  <!-- Port array -->
  <rect x="186" y="139" width="7" height="5" rx="1" fill="#0d3f50"/>
  <rect x="195" y="139" width="7" height="5" rx="1" fill="#0d3f50"/>
  <rect x="204" y="139" width="7" height="5" rx="1" fill="#0d3f50"/>
  <rect x="213" y="139" width="7" height="5" rx="1" fill="#0d3f50"/>
  <rect x="186" y="146" width="7" height="5" rx="1" fill="#0d3f50"/>
  <rect x="195" y="146" width="7" height="5" rx="1" fill="#0d3f50"/>
  <rect x="204" y="146" width="7" height="5" rx="1" fill="#0d3f50"/>
  <rect x="213" y="146" width="7" height="5" rx="1" fill="#0d3f50"/>
  <!-- Port indicators -->
  <circle cx="234" cy="141" r="2" fill="#76b900" opacity="0.9"/>
  <circle cx="240" cy="141" r="2" fill="#76b900" opacity="0.6"/>
  <circle cx="246" cy="141" r="2" fill="#a0d000" opacity="0.8"/>
  <circle cx="234" cy="148" r="2" fill="#76b900" opacity="0.4"/>
  <circle cx="240" cy="148" r="2" fill="#76b900" opacity="0.9"/>
  <circle cx="246" cy="148" r="2" fill="#ff6b35" opacity="0.6"/>
  <!-- Label strip -->
  <rect x="186" y="154" width="55" height="8" rx="1" fill="#0d3f50" opacity="0.6"/>
  <line x1="197" y1="156" x2="197" y2="160" stroke="#76b900" stroke-width="0.8" opacity="0.5"/>
  <line x1="210" y1="156" x2="210" y2="160" stroke="#76b900" stroke-width="0.8" opacity="0.5"/>
  <line x1="223" y1="156" x2="223" y2="160" stroke="#76b900" stroke-width="0.8" opacity="0.5"/>

  <!-- Outer bezel / frame -->
  <rect x="176" y="56" width="80" height="115" rx="5" stroke="#5ab8d4" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- ── SMALL SCREEN / PANEL ON SERVER TOP ─── -->
  <rect x="186" y="52" width="22" height="4" rx="1" fill="#76b900" opacity="0.25"/>

</svg>
